<script>
    let diceVal = 0;
    let currentPlayer = 'red'; // शुरू में आप (लाल)
    let canMove = false;

    // रास्ते का डेटा (हर रंग के लिए अलग रास्ता)
    const paths = {
        red: [106, 107, 108, 109, 110, 111, 96, 81, 66, 51, 36, 21, 22, 23, 38, 53, 68, 83, 98, 113 /* ... और भी आगे */],
        // इसी तरह बाकी रंगों के लिए
    };

    function build() {
        // (पुराना रेंडर कोड यहाँ रहेगा)
        renderTokens(); 
    }

    function roll() {
        if (canMove) return; // जब तक चाल न चले, दोबारा पासा नहीं
        diceVal = Math.floor(Math.random()*6)+1;
        document.getElementById('dice-btn').innerHTML = ["","⚀","⚁","⚂","⚃","⚄","⚅"][diceVal];
        document.getElementById('msg').innerHTML = "नंबर आया: " + diceVal;
        
        canMove = true;
        // गोटियों को चमकाएं ताकि यूजर को पता चले कि उसे क्या छूना है
        document.querySelectorAll(`.${currentPlayer}-t`).forEach(t => t.style.boxShadow = "0 0 15px gold");
    }

    function moveToken(color, tokenElement) {
        if (!canMove || color !== currentPlayer) return;

        // नियम: ६ आने पर ही घर से बाहर निकलेंगे
        if (diceVal === 6) {
            alert("शाही गोटी मैदान में उतर गई!");
            // यहाँ हम गोटी को बोर्ड के पहले डब्बे पर भेजेंगे
        } else {
            alert("मैदान में उतरने के लिए ६ चाहिए!");
        }

        canMove = false;
        // अगले खिलाड़ी की बारी (यहाँ हम कंप्यूटर को टर्न दे सकते हैं)
        currentPlayer = 'green'; 
        document.getElementById('msg').innerHTML = "कंप्यूटर की बारी...";
    }

    window.onload = build;
</script>
