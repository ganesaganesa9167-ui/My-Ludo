<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo Royal v18 - Detailed Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. वैश्विक सेटिंग्स (Global Settings) --- */
        :root {
            --red: #eb1c24; --green: #27ae60; --blue: #2980b9; --yellow: #f1c40f;
            --white: #ffffff; --black: #2c3e50; --gold: #d4af37;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #0f172a; color: white; font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }

        /* --- 2. शाही बोर्ड का ढांचा (The Royal Framework) --- */
        .game-area {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            width: 100%; max-width: 500px;
        }

        .ludo-board {
            display: grid; 
            grid-template-columns: repeat(15, 1fr); 
            grid-template-rows: repeat(15, 1fr);
            width: 96vw; height: 96vw; max-width: 420px; max-height: 420px;
            background: var(--white); border: 10px solid var(--gold);
            border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        /* सेल्स की बारीक कोडिंग */
        .cell { border: 0.1px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; position: relative; font-size: 1.2rem; }

        /* --- 3. कोनों के शाही महल (Home Bases) --- */
        .home-base { grid-column: span 6; grid-row: span 6; display: grid; grid-template-columns: repeat(2, 1fr); padding: 12%; gap: 15px; border: 1px solid #000; z-index: 5; }
        .red-base { grid-area: 1/1/7/7; background: var(--red); }
        .green-base { grid-area: 1/10/7/16; background: var(--green); }
        .blue-base { grid-area: 10/1/16/7; background: var(--blue); }
        .yellow-base { grid-area: 10/10/16/16; background: var(--yellow); }

        .token-slot { background: var(--white); border-radius: 50%; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 2px solid #333; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        
        /* गोटियाँ (The Royal Tokens) */
        .token { 
            width: 80%; height: 80%; border-radius: 50%; border: 2px solid #fff; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 10;
        }
        .rt { background: radial-gradient(circle at 35% 35%, #ff4d4d, #990000); }
        .gt { background: radial-gradient(circle at 35% 35%, #4dff4d, #006600); }
        .bt { background: radial-gradient(circle at 35% 35%, #4d4dff, #000099); }
        .yt { background: radial-gradient(circle at 35% 35%, #ffff4d, #999900); }

        /* --- 4. केंद्र का संगम (The Conic Center) --- */
        .center-finish {
            grid-area: 7/7/10/10; border: 2px solid #000; z-index: 10;
            background: conic-gradient(from 45deg, var(--yellow) 0deg 90deg, var(--blue) 90deg 180deg, var(--red) 180deg 270deg, var(--green) 270deg 360deg);
        }

        /* रास्तों के पक्के रंग */
        .p-red { background: var(--red); } .p-green { background: var(--green); }
        .p-blue { background: var(--blue); } .p-yellow { background: var(--yellow); }
        .star-spot { background: #e2e8f0; color: #1e293b; font-weight: bold; }

        /* --- 5. शाही पासा (The Professional Dice) --- */
        .controls { display: flex; flex-direction: column; align-items: center; margin-top: 15px; }
        #dice-box {
            width: 85px; height: 85px; background: #fff; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; color: var(--black); font-weight: bold;
            box-shadow: 0 10px 0 #94a3b8, 0 20px 30px rgba(0,0,0,0.6);
            cursor: pointer; transition: 0.1s;
        }
        #dice-box:active { transform: translateY(5px); box-shadow: 0 5px 0 #94a3b8; }
        #status-msg { margin-top: 12px; font-weight: bold; color: var(--gold); font-size: 1.1rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="game-area">
        <h1 style="color:var(--gold); margin: 0 0 10px 0; text-shadow: 2px 2px #000;">👑 MY LUDO - ROYAL 👑</h1>
        
        <div class="ludo-board" id="board-container">
            <div class="home-base red-base"><div class="token-slot"><div class="token rt"></div></div><div class="token-slot"><div class="token rt"></div></div><div class="token-slot"><div class="token rt"></div></div><div class="token-slot"><div class="token rt"></div></div></div>
            <div class="home-base green-base"><div class="token-slot"><div class="token gt"></div></div><div class="token-slot"><div class="token gt"></div></div><div class="token-slot"><div class="token gt"></div></div><div class="token-slot"><div class="token gt"></div></div></div>
            <div class="home-base blue-base"><div class="token-slot"><div class="token bt"></div></div><div class="token-slot"><div class="token bt"></div></div><div class="token-slot"><div class="token bt"></div></div><div class="token-slot"><div class="token bt"></div></div></div>
            <div class="home-base yellow-base"><div class="token-slot"><div class="token yt"></div></div><div class="token-slot"><div class="token yt"></div></div><div class="token-slot"><div class="token yt"></div></div><div class="token-slot"><div class="token yt"></div></div></div>
            
            <div class="center-finish"></div>
        </div>

        <div class="controls">
            <div id="dice-box" onclick="rollDice()">🎲</div>
            <p id="status-msg">पासा फेंकें</p>
        </div>
    </div>

    <script>
        // --- द चाणक्य इंजन (The Core Logic) ---
        function initializeBoard() {
            const board = document.getElementById('board-container');
            // गणितीय सितारे (The 8 Scientific Stars)
            const stars = [
                {r:7,c:2}, {r:9,c:3},   // Red Stars
                {r:2,c:9}, {r:3,c:7},   // Green Stars
                {r:9,c:14}, {r:7,c:13}, // Yellow Stars
                {r:14,c:7}, {r:13,c:9}  // Blue Stars
            ];

            for(let i=0; i<225; i++) {
                let r = Math.floor(i/15) + 1;
                let c = (i%15) + 1;

                // केवल वही सेल बनाएँ जो होम बेस या सेंटर में नहीं हैं
                if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.gridArea = `${r} / ${c}`;

                    // सटीक रास्ते की कोडिंग (Path Mapping)
                    if (r === 8 && c >= 2 && c <= 6) cell.classList.add('p-red');
                    if (c === 8 && r >= 2 && r <= 6) cell.classList.add('p-green');
                    if (r === 8 && c >= 10 && c <= 14) cell.classList.add('p-yellow');
                    if (c === 8 && r >= 10 && r <= 14) cell.classList.add('p-blue');

                    // सितारों की सटीक प्लेसमेंट
                    if (stars.some(s => s.r === r && s.c === c)) {
                        cell.innerHTML = "⭐";
                        cell.classList.add('star-spot');
                    }
                    board.appendChild(cell);
                }
            }
        }

        function rollDice() {
            const v = Math.floor(Math.random() * 6) + 1;
            const diceIcons = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            const diceElement = document.getElementById('dice-box');
            
            // एनीमेशन के लिए छोटा सा रोटेशन
            diceElement.style.transform = "rotate(360deg)";
            setTimeout(() => {
                diceElement.innerHTML = diceIcons[v];
                diceElement.style.transform = "rotate(0deg)";
                document.getElementById('status-msg').innerHTML = "नंबर आया: " + v;
                if(navigator.vibrate) navigator.vibrate(50);
            }, 100);
        }

        window.onload = initializeBoard;
    </script>
</body>
</html>
