<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo - Royal Engine v4</title>
    <style>
        :root {
            --bg: #0f172a; --gold: #fbbf24;
            --red: #ef4444; --green: #22c55e; --blue: #3b82f6; --yellow: #facc15;
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* प्रीमियम बोर्ड */
        .board { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 92vw; height: 92vw; max-width: 380px; max-height: 380px; 
            background: white; margin: 10px auto; border: 6px solid #c5a059; border-radius: 12px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8); position: relative;
        }

        .cell { border: 0.1px solid rgba(0,0,0,0.05); position: relative; display: flex; align-items: center; justify-content: center; z-index: 1; }
        
        /* कलर कोडिंग */
        .red { background: var(--red); } .green { background: var(--green); } 
        .blue { background: var(--blue); } .yellow { background: var(--yellow); }
        .safe { background: #e2e8f0; } /* सुरक्षित स्थान */

        /* गोटियाँ - एनिमेटेड और प्रीमियम */
        .token { 
            width: 80%; height: 80%; border-radius: 50%; border: 2px solid white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.6); cursor: pointer; z-index: 100;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
        }
        .token:hover { transform: scale(1.2); z-index: 101; }
        .red-t { background: radial-gradient(circle at 30% 30%, #ff8888, var(--red)); }
        .green-t { background: radial-gradient(circle at 30% 30%, #88ff88, var(--green)); }

        /* पासा (Dice) */
        #dice-container { margin-top: 20px; text-align: center; }
        #dice-btn { 
            width: 70px; height: 70px; background: white; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 40px; color: #1e293b;
            box-shadow: 0 6px 0 #cbd5e1, 0 10px 20px rgba(0,0,0,0.5); cursor: pointer;
            transition: 0.1s;
        }
        #dice-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #cbd5e1; }
    </style>
</head>
<body>

    <h1 style="color:var(--gold); margin: 10px;">👑 MY LUDO 👑</h1>
    <div id="board" class="board"></div>
    
    <div id="dice-container">
        <div id="dice-btn" onclick="rollDice()">🎲</div>
        <p id="status" style="margin-top:10px; font-weight:bold; color:var(--gold)">पासा फेंकें</p>
    </div>

    <script>
        let diceVal = 0;
        let canMove = false;

        // 1. बोर्ड बनाना और गोटियों को ID देना
        function init() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'cell-' + i;
                let r = Math.floor(i/15), c = i%15;

                // घरों के रंग
                if (r<6 && c<6) cell.classList.add('red');
                if (r<6 && c>8) cell.classList.add('green');
                if (r>8 && c<6) cell.classList.add('blue');
                if (r>8 && c>8) cell.classList.add('yellow');

                // गोटियाँ रखना (ID के साथ)
                if (r===2 && c===2) addToken(cell, 'red', 1);
                if (r===2 && c===3) addToken(cell, 'red', 2);
                if (r===2 && c===11) addToken(cell, 'green', 1);

                board.appendChild(cell);
            }
        }

        function addToken(parent, color, id) {
            const t = document.createElement('div');
            t.className = `token ${color}-t`;
            t.onclick = () => moveToken(color, id);
            parent.appendChild(t);
        }

        // 2. पासा फेंकना (Dice Logic)
        function rollDice() {
            if (canMove) return; // जब तक चाल पूरी न हो, दोबारा पासा नहीं
            diceVal = Math.floor(Math.random()*6)+1;
            const icons = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
            document.getElementById('dice-btn').innerHTML = icons[diceVal];
            document.getElementById('status').innerHTML = "नंबर आया: " + diceVal;
            
            canMove = true; 
            document.getElementById('status').style.color = "#2ecc71"; // 'चाल चलें' का संकेत
            if(navigator.vibrate) navigator.vibrate(50);
        }

        // 3. गोटी की चाल (Movement Logic)
        function moveToken(color, id) {
            if (!canMove) return;
            
            // मनोवैज्ञानिक नियम: केवल '6' आने पर ही गोटी घर से बाहर निकलेगी
            if (diceVal !== 6) {
                alert("गोटी बाहर निकालने के लिए 6 चाहिए!");
            } else {
                alert("शानदार! गोटी मैदान में उतर गई।");
                // यहाँ हम गोटी को रास्ते के पहले खाने (Cell 105) पर भेजेंगे
            }
            
            canMove = false; // चाल खत्म
            document.getElementById('status').innerHTML = "अगला पासा फेंकें";
            document.getElementById('status').style.color = "#fbbf24";
        }

        window.onload = init;
    </script>
</body>
</html>
