<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo - Royal Architect v6</title>
    <style>
        :root {
            --bg: #0f172a; --gold: #fbbf24;
            --red: #ef4444; --green: #22c55e; --blue: #3b82f6; --yellow: #facc15;
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center; }
        
        /* असली 15x15 बोर्ड डिजाइन */
        .board { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 95vw; height: 95vw; max-width: 400px; max-height: 400px; 
            background: #fff; border: 8px solid #c5a059; border-radius: 10px; box-shadow: 0 0 50px #000; position: relative;
        }

        .cell { border: 0.1px solid rgba(0,0,0,0.08); position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* केंद्र का शाही त्रिभुज (The Finish Area) */
        .center-home {
            grid-area: 7 / 7 / 10 / 10;
            background: conic-gradient(var(--green) 0deg 90deg, var(--yellow) 90deg 180deg, var(--blue) 180deg 270deg, var(--red) 270deg 360deg);
            z-index: 5; border: 2px solid #000;
        }

        /* होम एरिया और शाही रास्ते */
        .home-red { grid-area: 1 / 1 / 7 / 7; background: var(--red); }
        .home-green { grid-area: 1 / 10 / 7 / 16; background: var(--green); }
        .home-blue { grid-area: 10 / 1 / 16 / 7; background: var(--blue); }
        .home-yellow { grid-area: 10 / 10 / 16 / 16; background: var(--yellow); }

        /* रास्तों के सटीक रंग (Correct Mapping) */
        .path-red { background: var(--red); } .path-green { background: var(--green); }
        .path-blue { background: var(--blue); } .path-yellow { background: var(--yellow); }
        .safe-star { background: #e2e8f0; font-size: 10px; }

        /* गोटियों का प्रीमियम लुक */
        .token { 
            width: 80%; height: 80%; border-radius: 50%; border: 2px solid white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10;
        }
        .red-t { background: radial-gradient(circle at 30% 30%, #ffaaaa, var(--red)); }
        .green-t { background: radial-gradient(circle at 30% 30%, #aaffaa, var(--green)); }

        #dice-btn { 
            width: 70px; height: 70px; background: white; border-radius: 15px; margin-top: 20px;
            display: flex; align-items: center; justify-content: center; font-size: 40px; color: #1e293b;
            box-shadow: 0 8px 0 #cbd5e1, 0 15px 20px rgba(0,0,0,0.5); cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 style="color:var(--gold); font-size: 1.5rem; margin-bottom: 5px;">👑 MY LUDO 👑</h1>
    <div id="board" class="board">
        <div class="home-red"></div>
        <div class="home-green"></div>
        <div class="home-blue"></div>
        <div class="home-yellow"></div>
        <div class="center-home"></div>
    </div>
    
    <div id="dice-btn" onclick="roll()">🎲</div>
    <p id="msg" style="margin-top:10px; font-weight:bold; color:var(--gold)">पासा फेंकें</p>

    <script>
        function init() {
            const b = document.getElementById('board');
            for(let i=0; i<225; i++) {
                let r=Math.floor(i/15), c=i%15;
                // अगर सेल होम एरिया के अंदर नहीं है और सेंटर में नहीं है, तो उसे बनाएं
                if(!((r<6 && c<6) || (r<6 && c>8) || (r>8 && c<6) || (r>8 && c>8) || (r>=6 && r<=8 && c>=6 && c<=8))) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    // शाही रास्ते का सटीक नक्शा
                    if (r === 7 && c >= 1 && c <= 5) cell.classList.add('path-red'); // लाल रास्ता
                    if (c === 7 && r >= 1 && r <= 5) cell.classList.add('path-green'); // हरा रास्ता
                    if (c === 7 && r >= 9 && r <= 13) cell.classList.add('path-blue'); // नीला रास्ता
                    if (r === 7 && c >= 9 && c <= 13) cell.classList.add('path-yellow'); // पीला रास्ता
                    
                    // सुरक्षित स्थान (Safe Spots)
                    if ((r===6 && c===1) || (r===1 && c===8) || (r===8 && c===13) || (r===13 && c===6)) cell.innerHTML = "⭐";
                    
                    b.appendChild(cell);
                }
            }
        }

        function roll() {
            const v = Math.floor(Math.random()*6)+1;
            document.getElementById('dice-btn').innerHTML = ["","⚀","⚁","⚂","⚃","⚄","⚅"][v];
            document.getElementById('msg').innerHTML = "नंबर आया: " + v;
        }

        window.onload = init;
    </script>
</body>
</html>
