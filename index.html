<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiv Shakti Ludo UI</title>
    <style>
        /* CSS: डिजाइन */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #1a1a2e; /* गहरा नेवी ब्लू */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: white;
        }

        /* टॉप स्टेटस बार */
        .status-container {
            display: flex;
            justify-content: space-between;
            width: 350px;
            margin-bottom: 20px;
        }

        .player-status {
            border: 2px solid;
            padding: 8px 15px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            text-align: center;
            font-size: 14px;
        }
        .blue-status { border-color: #3498db; color: #fff; }
        .yellow-status { border-color: #f1c40f; color: #fff; }

        /* मुख्य लूडो बोर्ड */
        .ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 350px;
            height: 350px;
            background-color: white;
            border: 8px solid #333;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        /* होम एरिया */
        .home { grid-column: span 6; grid-row: span 6; display: grid; grid-template-columns: 1fr 1fr; padding: 15px; }
        
        .red-home { background-color: #ff3e5e; }
        .yellow-home { background-color: #ffcc00; }
        .blue-home { background-color: #2e86c1; }
        .green-home { background-color: #27ae60; }

        /* स्लॉट्स (सफेद गोले) */
        .slot {
            background: radial-gradient(circle, #ffffff, #e0e0e0);
            border-radius: 50%;
            margin: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* सेंटर 2x2 कलर्स */
        .center-box {
            grid-column: 7 / 10;
            grid-row: 7 / 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .c-green { background-color: #27ae60; }
        .c-red { background-color: #ff3e5e; }
        .c-yellow { background-color: #ffcc00; }
        .c-blue { background-color: #2e86c1; }

        /* सफेद रास्ते (Pathways) */
        .path { background-color: white; }

        /* पासा (Dice) सेक्शन */
        .dice-area {
            margin-top: 40px;
            text-align: center;
        }

        .dice-box {
            background: white;
            color: black;
            width: 80px;
            height: 80px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            margin: 10px auto;
        }

        .result-label {
            font-size: 20px;
            color: #ffcc00; /* पीला टेक्स्ट */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="player-status blue-status">🤖 कंप्यूटर <br> ⚔️ 0</div>
        <div class="player-status yellow-status">🤖 कंप्यूटर <br> ⚔️ 0</div>
    </div>

    <div class="ludo-board">
        <div class="home red-home">
            <div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div>
        </div>

        <div class="path" style="grid-column: 7/10; grid-row: 1/7;"></div>

        <div class="home yellow-home">
            <div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div>
        </div>

        <div class="path" style="grid-column: 1/7; grid-row: 7/10;"></div>

        <div class="center-box">
            <div class="c-green"></div>
            <div class="c-red"></div>
            <div class="c-yellow"></div>
            <div class="c-blue"></div>
        </div>

        <div class="path" style="grid-column: 10/16; grid-row: 7/10;"></div>

        <div class="home blue-home"></div>

        <div class="path" style="grid-column: 7/10; grid-row: 10/16;"></div>

        <div class="home green-home"></div>
    </div>

    <div class="dice-area">
        <div class="dice-box" id="dice" onclick="roll()">⚃</div>
        <div class="result-label">आया: <span id="num">4</span></div>
    </div>

    <script>
        function roll() {
            const diceArr = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            const n = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice').innerText = diceArr[n-1];
            document.getElementById('num').innerText = n;
        }
    </script>

</body>
</html>
