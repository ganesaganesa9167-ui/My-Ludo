<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Master v35 - The Concrete Fix</title>
    <style>
        :root { --r:#ff3e3e; --g:#2ecc71; --b:#3498db; --y:#f1c40f; --gold:#ffd700; --bg:#1a142e; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg); color:white; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; justify-content:space-between; }

        /* प्लेयर प्रोफाइल - जैसा आपकी फोटो में है */
        .ui-bar { width:100%; display:flex; justify-content:space-between; padding:10px 15px; }
        .p-box { background:rgba(0,0,0,0.5); border:2px solid #555; border-radius:8px; display:flex; align-items:center; padding:5px 10px; gap:8px; min-width:120px; }
        .active-p { border-color:var(--gold); box-shadow: 0 0 15px var(--gold); background: rgba(255,215,0,0.1); }
        .av { width:35px; height:35px; background:#fff; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:22px; }

        /* 15x15 का वज्र ढांचा */
        .board { 
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            width:96vw; height:96vw; max-width:400px; max-height:400px;
            background:#fff; border:8px solid #333; box-shadow:0 10px 40px #000; position: relative;
        }
        .c { border:0.1px solid #ddd; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }

        /* कोनों के शाही घर (Fortresses) */
        .base { grid-column: span 6; grid-row: span 6; display:grid; grid-template-columns:repeat(2,1fr); padding:10%; gap:12px; border:1px solid #000; z-index:10; }
        .b-blue { grid-area: 1/1/7/7; background:var(--b); }
        .b-yellow { grid-area: 1/10/7/16; background:var(--y); }
        .b-red { grid-area: 10/1/16/7; background:var(--r); } /* आप (लाल) */
        .b-green { grid-area: 10/10/16/16; background:var(--g); }

        .slot { background:rgba(0,0,0,0.2); border-radius:50%; width:100%; height:100%; border:2px solid #fff; display:flex; align-items:center; justify-content:center; }
        .token { width:80%; height:80%; border-radius:50%; border:2px solid #fff; box-shadow:0 4px 8px #000; cursor:pointer; z-index:100; transition: 0.2s; }
        .rt { background:radial-gradient(circle, #ff6b6b, #800); }
        .bt { background:radial-gradient(circle, #4dabf7, #00008b); }
        .yt { background:radial-gradient(circle, #fcc419, #997300); }
        .gt { background:radial-gradient(circle, #51cf66, #006400); }

        .center { grid-area:7/7/10/10; background:conic-gradient(from 45deg, var(--y) 0deg 90deg, var(--g) 90deg 180deg, var(--r) 180deg 270deg, var(--b) 270deg 360deg); border:1px solid #000; z-index:15; }

        /* रास्तों की सटीक रंगाई (Manual Path Color) */
        .p-red { background:var(--r)!important; } .p-green { background:var(--g)!important; }
        .p-blue { background:var(--b)!important; } .p-yellow { background:var(--y)!important; }
        .star { font-size:1.3rem; font-weight:bold; }

        /* बॉटम कंट्रोल (Dice) */
        .footer { width:100%; display:flex; flex-direction:column; align-items:center; padding:10px; background:#120d24; border-top:2px solid var(--gold); }
        .dice { width:70px; height:70px; background:#fff; border-radius:15px; color:#000; font-size:45px; display:flex; align-items:center; justify-content:center; box-shadow: 0 6px 0 #bdc3c7; cursor:pointer; }
    </style>
</head>
<body>

    <div class="ui-bar">
        <div class="p-box" id="u-blue" style="border-color:var(--b)"><div class="av">🤖</div><div style="font-size:10px;">कंप्यूटर<br>⚔️ 0</div></div>
        <div class="p-box" id="u-yellow" style="border-color:var(--y)"><div class="av">🤖</div><div style="font-size:10px;">कंप्यूटर<br>⚔️ 0</div></div>
    </div>

    <div class="board" id="board">
        <div class="base b-blue" id="blue-base"></div>
        <div class="base b-yellow" id="yellow-base"></div>
        <div class="base b-red" id="red-base"></div>
        <div class="base b-green" id="green-base"></div>
        <div class="center"></div>
        </div>

    <div class="ui-bar">
        <div class="p-box active-p" id="u-red" style="border-color:var(--r)"><div class="av">👨</div><div style="font-size:10px;">खिलाड़ी (लाल)<br>⚔️ 0</div></div>
        <div class="p-box" id="u-green" style="border-color:var(--g)"><div class="av">🤖</div><div style="font-size:10px;">कंप्यूटर<br>⚔️ 0</div></div>
    </div>

    <div class="footer">
        <div id="msg" style="color:var(--gold); font-weight:bold; margin-bottom:5px;">पासा छुएं</div>
        <div class="dice" id="dice" onclick="roll()">🎲</div>
    </div>

    <script>
        let diceVal = 0, turn = 'red', canMove = false;
        let positions = { red:[-1,-1,-1,-1], blue:[-1,-1,-1,-1], yellow:[-1,-1,-1,-1], green:[-1,-1,-1,-1] };

        function buildBoard() {
            const b = document.getElementById('board');
            // सटीक ८ सितारे (४ रंगीन, ४ ग्रे)
            const colorStars = { "14-7":"var(--r)", "7-2":"var(--b)", "2-9":"var(--y)", "9-14":"var(--g)" };
            const greyStars = ["13-9", "9-3", "3-7", "7-13"];

            for(let r=1; r<=15; r++) {
                for(let c=1; c<=15; c++) {
                    if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                        const cell = document.createElement('div');
                        cell.className = 'c'; cell.id = `c-${r}-${c}`; cell.style.gridArea = `${r}/${c}`;
                        
                        // होम स्ट्रेच की रंगाई (The Home Paths)
                        if (c===8 && r>=10 && r<=14) cell.classList.add('p-red'); // Red
                        if (r===8 && c>=2 && c<=6) cell.classList.add('p-blue'); // Blue
                        if (c===8 && r>=2 && r<=6) cell.classList.add('p-yellow'); // Yellow
                        if (r===8 && c>=10 && c<=14) cell.classList.add('p-green'); // Green

                        const pos = `${r}-${c}`;
                        if (colorStars[pos]) { cell.innerHTML="★"; cell.style.color=colorStars[pos]; cell.classList.add('star'); }
                        else if (greyStars.includes(pos)) { cell.innerHTML="★"; cell.style.color="#ccc"; cell.classList.add('star'); }

                        b.appendChild(cell);
                    }
                }
            }
            setupTokens();
        }

        function setupTokens() {
            ['red', 'blue', 'yellow', 'green'].forEach(color => {
                const base = document.getElementById(`${color}-base`);
                base.innerHTML = '';
                for(let i=0; i<4; i++) {
                    const slot = document.createElement('div'); slot.className = 'slot';
                    const t = document.createElement('div');
                    t.className = `token ${color.charAt(0)}t`; t.id = `t-${color}-${i}`;
                    t.onclick = () => moveToken(color, i);
                    slot.appendChild(t); base.appendChild(slot);
                }
            });
        }

        function roll() {
            if (canMove) return;
            diceVal = Math.floor(Math.random()*6)+1;
            document.getElementById('dice').innerHTML = ["","⚀","⚁","⚂","⚃","⚄","⚅"][diceVal];
            document.getElementById('msg').innerHTML = "नंबर आया: " + diceVal;
            canMove = true;
            if(navigator.vibrate) navigator.vibrate(40);
        }

        function moveToken(color, idx) {
            if (!canMove || color !== turn) return;
            const token = document.getElementById(`t-${color}-${idx}`);
            // ६ आने पर घर से बाहर (Symmetry fixed)
            if (positions[color][idx] === -1 && diceVal === 6) {
                const starts = { red:'14-7', blue:'7-2', yellow:'2-9', green:'9-14' };
                document.getElementById(`c-${starts[color]}`).appendChild(token);
                positions[color][idx] = 0;
                canMove = false;
                setTimeout(changeTurn, 800);
            } else if (positions[color][idx] !== -1) {
                // जम्प लॉजिक को अभी सिंपल रखा है ताकि क्रैश न हो
                canMove = false;
                changeTurn();
            }
        }

        function changeTurn() {
            const order = ['red', 'green', 'yellow', 'blue'];
            document.getElementById(`u-${turn}`).classList.remove('active-p');
            turn = order[(order.indexOf(turn) + 1) % 4];
            document.getElementById(`u-${turn}`).classList.add('active-p');
            document.getElementById('msg').innerHTML = turn.toUpperCase() + " की बारी...";
            canMove = false;
        }

        window.onload = buildBoard;
    </script>
</body>
</html>
