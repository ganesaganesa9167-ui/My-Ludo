<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo Pro v27</title>
    <style>
        :root {
            --red: #ff3e3e; --green: #2ecc71; --blue: #3498db; --yellow: #f1c40f;
            --bg: #312651; --gold: #ffd700;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; color: white; overflow: hidden; }

        /* --- 1. प्लेयर प्रोफाइल यूआई (Top & Bottom Bars) --- */
        .ui-bar { width: 100%; display: flex; justify-content: space-between; padding: 10px 15px; }
        .p-box { background: rgba(0,0,0,0.4); border: 2px solid #555; border-radius: 8px; display: flex; align-items: center; padding: 4px 8px; gap: 8px; min-width: 120px; }
        .p-avatar { width: 35px; height: 35px; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .p-info { font-size: 11px; line-height: 1.2; font-weight: bold; }

        /* --- 2. प्रो-बोर्ड (The Precision Board) --- */
        .board-container { 
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            width: 98vw; height: 98vw; max-width: 420px; max-height: 420px;
            background: #fff; border: 6px solid #222; border-radius: 4px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative;
        }
        .cell { border: 0.1px solid #ddd; display: flex; align-items: center; justify-content: center; position: relative; }

        /* होम ब्लॉक्स */
        .home { grid-column: span 6; grid-row: span 6; border: 1px solid #000; display: grid; grid-template-columns: repeat(2, 1fr); padding: 12%; gap: 10px; }
        .h-blue { grid-area: 1/1/7/7; background: var(--blue); }
        .h-yellow { grid-area: 1/10/7/16; background: var(--yellow); }
        .h-red { grid-area: 10/1/16/7; background: var(--red); }
        .h-green { grid-area: 10/10/16/16; background: var(--green); }
        
        .slot { background: rgba(255,255,255,0.3); border-radius: 50%; width: 100%; height: 100%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; }
        .token { width: 85%; height: 85%; border-radius: 50%; border: 2px solid white; box-shadow: 0 4px 8px #000; }
        .bt { background: radial-gradient(circle, #5dade2, #1b4f72); }
        .yt { background: radial-gradient(circle, #f7dc6f, #b7950b); }
        .rt { background: radial-gradient(circle, #ec7063, #7b241c); }
        .gt { background: radial-gradient(circle, #58d68d, #186a3b); }

        .center { grid-area: 7/7/10/10; background: conic-gradient(from 45deg, var(--yellow) 0deg 90deg, var(--green) 90deg 180deg, var(--red) 180deg 270deg, var(--blue) 270deg 360deg); border: 2px solid #000; z-index: 20; }

        /* सटीक रंगीन रास्ते (Professional Reference Mapping) */
        .path-blue { background: var(--blue) !important; } .path-yellow { background: var(--yellow) !important; }
        .path-red { background: var(--red) !important; } .path-green { background: var(--green) !important; }
        
        /* सितारों की वैज्ञानिक प्लेसमेंट (Star Shapes) */
        .star { font-size: 1.2rem; filter: drop-shadow(0 0 1px #000); font-weight: bold; }

        /* --- 3. बॉटम कंट्रोल बार --- */
        .footer-bar { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 12px; background: #221a3a; border-top: 2px solid var(--gold); }
        .ctrl-btn { width: 45px; height: 45px; background: #2ecc71; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 0 #1b7e46; cursor: pointer; }
        .dice-area { width: 75px; height: 75px; background: #fff; border-radius: 12px; color: #000; font-size: 45px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 0 #bdc3c7; }
    </style>
</head>
<body>

    <div class="ui-bar">
        <div class="p-box" style="border-color:var(--blue)">
            <div class="p-avatar">🤖</div>
            <div class="p-info">कंप्यूटर<br>⚔️ 0  💀 0</div>
        </div>
        <div class="p-box" style="border-color:var(--yellow)">
            <div class="p-avatar">🤖</div>
            <div class="p-info">कंप्यूटर<br>⚔️ 0  💀 0</div>
        </div>
    </div>

    <div class="board-container" id="ludo-board">
        <div class="home h-blue"><div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div></div>
        <div class="home h-yellow"><div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div></div>
        <div class="home h-red"><div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div></div>
        <div class="home h-green"><div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div></div>
        <div class="center"></div>
    </div>

    <div class="ui-bar">
        <div class="p-box" style="border-color:var(--red); background: rgba(231, 76, 60, 0.2);">
            <div class="p-avatar">👨</div>
            <div class="p-info">खिलाड़ी (आप)<br>⚔️ 0  💀 0</div>
        </div>
        <div class="p-box" style="border-color:var(--green)">
            <div class="p-avatar">🤖</div>
            <div class="p-info">कंप्यूटर<br>⚔️ 0  💀 0</div>
        </div>
    </div>

    <div class="footer-bar">
        <div class="ctrl-btn" style="background:#e74c3c; box-shadow:0 4px 0 #c0392b;">❮</div>
        <div class="dice-area" id="dice" onclick="roll()">🎲</div>
        <div class="ctrl-btn">🏃</div>
        <div class="ctrl-btn" style="background:#34495e; box-shadow:0 4px 0 #2c3e50;">⚙️</div>
    </div>

    <script>
        function renderBoard() {
            const b = document.getElementById('ludo-board');
            // सटीक ८ सितारे (As per Reference)
            const coloredStars = { "7-2":"#3498db", "2-9":"#f1c40f", "14-7":"#ff3e3e", "9-14":"#2ecc71" };
            const greyStars = ["9-3", "3-7", "7-13", "13-9"];

            for(let r=1; r<=15; r++) {
                for(let c=1; c<=15; c++) {
                    if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.style.gridArea = `${r}/${c}`;

                        // रास्तों का शुद्धिकरण (Home Stretches)
                        if (r===8 && c>=2 && c<=6) cell.classList.add('path-blue'); // Blue (Left)
                        if (c===8 && r>=2 && r<=6) cell.classList.add('path-yellow'); // Yellow (Top)
                        if (c===8 && r>=10 && r<=14) cell.classList.add('path-red'); // Red (Bottom)
                        if (r===8 && c>=10 && c<=14) cell.classList.add('path-green'); // Green (Right)

                        // सितारों का विन्यास
                        const pos = `${r}-${c}`;
                        if (coloredStars[pos]) {
                            cell.innerHTML = "★"; cell.style.color = coloredStars[pos]; cell.classList.add('star');
                        } else if (greyStars.includes(pos)) {
                            cell.innerHTML = "★"; cell.style.color = "#ccc"; cell.classList.add('star');
                        }

                        b.appendChild(cell);
                    }
                }
            }
        }

        function roll() {
            const v = Math.floor(Math.random()*6)+1;
            const diceIcons = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
            document.getElementById('dice').innerHTML = diceIcons[v];
            if(navigator.vibrate) navigator.vibrate(50);
        }

        window.onload = renderBoard;
    </script>
</body>
</html>
