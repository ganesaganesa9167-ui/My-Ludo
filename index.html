<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo Royal v32 - Absolute Perfection</title>
    <style>
        :root { --r:#ff3e3e; --g:#2ecc71; --b:#3498db; --y:#f1c40f; --bg:#312651; --gold:#ffd700; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:space-between; height:100vh; color:white; overflow:hidden; }

        /* --- 1. प्लेयर यूआई (Header & Footer) --- */
        .p-bar { width:100%; display:flex; justify-content:space-between; padding:8px 15px; }
        .p-card { background:rgba(0,0,0,0.4); border:2px solid #555; border-radius:8px; display:flex; align-items:center; padding:5px 10px; gap:8px; min-width:125px; }
        .active-p { border-color:var(--gold); box-shadow: 0 0 15px var(--gold); }
        .av { width:35px; height:35px; background:#fff; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:24px; }

        /* --- 2. बोर्ड (Symmetric Concrete Grid) --- */
        .board { 
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            width:96vw; height:96vw; max-width:400px; max-height:400px;
            background:#fff; border:8px solid #333; box-shadow:0 10px 40px #000;
        }
        .c { border:0.1px solid #ddd; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }

        /* शाही घर (Fortresses) */
        .base { grid-column: span 6; grid-row: span 6; display:grid; grid-template-columns:repeat(2,1fr); padding:10%; gap:12px; border:1px solid #000; z-index:10; }
        .b-blue { grid-area:1/1/7/7; background:var(--b); }
        .b-yellow { grid-area:1/10/7/16; background:var(--y); }
        .b-red { grid-area:10/1/16/7; background:var(--r); } /* खिलाड़ी */
        .b-green { grid-area:10/10/16/16; background:var(--g); }

        .slot { background:rgba(0,0,0,0.2); border-radius:50%; width:100%; height:100%; border:2px solid #fff; display:flex; align-items:center; justify-content:center; }
        .token { width:80%; height:80%; border-radius:50%; border:2px solid #fff; box-shadow:0 4px 6px #000; cursor:pointer; z-index:100; }
        .rt { background:radial-gradient(circle, #ff6b6b, #900); }
        .bt { background:radial-gradient(circle, #4dabf7, #00008b); }
        .yt { background:radial-gradient(circle, #fcc419, #997300); }
        .gt { background:radial-gradient(circle, #51cf66, #006400); }

        .center { grid-area:7/7/10/10; background:conic-gradient(from 45deg, var(--y) 0deg 90deg, var(--g) 90deg 180deg, var(--r) 180deg 270deg, var(--b) 270deg 360deg); border:1px solid #000; z-index:15; }

        /* रास्तों की रंगाई (Manual Pathing) */
        .p-r { background:var(--r)!important; } .p-g { background:var(--g)!important; }
        .p-b { background:var(--b)!important; } .p-y { background:var(--y)!important; }

        /* सितारों की कोडिंग */
        .star { font-size:1.4rem; font-weight:bold; line-height:1; }

        /* --- 3. कंट्रोल पैनल --- */
        .footer { width:100%; display:flex; justify-content:space-around; align-items:center; padding:15px; background:#1a142e; border-top:2px solid var(--gold); }
        .dice { width:75px; height:75px; background:#fff; border-radius:15px; color:#000; font-size:45px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 0 #bdc3c7; cursor:pointer; }
    </style>
</head>
<body>

    <div class="p-bar">
        <div class="p-card" id="u-blue" style="border-color:var(--b)"><div class="av">🤖</div><div style="font-size:10px;">कंप्यूटर<br>⚔️ 0</div></div>
        <div class="p-card" id="u-yellow" style="border-color:var(--y)"><div class="av">🤖</div><div style="font-size:10px;">कंप्यूटर<br>⚔️ 0</div></div>
    </div>

    <div class="board" id="board">
        <div class="base b-blue" id="blue-base"></div>
        <div class="base b-yellow" id="yellow-base"></div>
        <div class="base b-red" id="red-base"></div>
        <div class="base b-green" id="green-base"></div>
        <div class="center"></div>
    </div>

    <div class="p-bar">
        <div class="p-card active-p" id="u-red" style="border-color:var(--r)"><div class="av">👨</div><div style="font-size:10px;">खिलाड़ी (आप)<br>⚔️ 0</div></div>
        <div class="p-card" id="u-green" style="border-color:var(--g)"><div class="av">🤖</div><div style="font-size:10px;">कंप्यूटर<br>⚔️ 0</div></div>
    </div>

    <div class="footer">
        <div class="dice" id="dice" onclick="roll()">🎲</div>
        <p id="msg" style="color:var(--gold); font-weight:bold; font-size:1.1rem;">पासा छुएं</p>
    </div>

    <script>
        let diceVal = 0, turn = 'red', canMove = false;
        let positions = { red:[-1,-1,-1,-1], blue:[-1,-1,-1,-1], green:[-1,-1,-1,-1], yellow:[-1,-1,-1,-1] };

        function build() {
            const b = document.getElementById('board');
            const colorStars = { "14-7":"var(--r)", "7-2":"var(--b)", "2-9":"var(--y)", "9-14":"var(--g)" };
            const neutralStars = ["13-9", "9-3", "3-7", "7-13"];

            for(let r=1; r<=15; r++) {
                for(let c=1; c<=15; c++) {
                    if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                        const cell = document.createElement('div');
                        cell.className = 'c'; cell.id = `c-${r}-${c}`; cell.style.gridArea = `${r}/${c}`;
                        
                        // रास्तों की सटीक रंगाई (Manual Matching based on Ref photo)
                        if (c===8 && r>=10 && r<=14) cell.classList.add('p-red'); // खिलाडी का रास्ता (Bottom)
                        if (r===8 && c>=2 && c<=6) cell.classList.add('p-blue'); // बाईं तरफ
                        if (c===8 && r>=2 && r<=6) cell.classList.add('p-yellow'); // ऊपर
                        if (r===8 && c>=10 && c<=14) cell.classList.add('p-green'); // दाईं तरफ

                        const pos = `${r}-${c}`;
                        if (colorStars[pos]) { cell.innerHTML="★"; cell.style.color=colorStars[pos]; cell.classList.add('star'); }
                        else if (neutralStars.includes(pos)) { cell.innerHTML="★"; cell.style.color="#ccc"; cell.classList.add('star'); }

                        b.appendChild(cell);
                    }
                }
            }
            deploy();
        }

        function deploy() {
            ['red', 'blue', 'yellow', 'green'].forEach(color => {
                const base = document.getElementById(`${color}-base`);
                base.innerHTML = '';
                for(let i=0; i<4; i++) {
                    const slot = document.createElement('div'); slot.className = 'slot';
                    const t = document.createElement('div');
                    t.className = `token ${color.charAt(0)}t`; t.id = `t-${color}-${i}`;
                    t.onclick = () => move(color, i);
                    slot.appendChild(t); base.appendChild(slot);
                }
            });
        }

        function roll() {
            if (canMove) return;
            diceVal = Math.floor(Math.random()*6)+1;
            document.getElementById('dice').innerHTML = ["","⚀","⚁","⚂","⚃","⚄","⚅"][diceVal];
            document.getElementById('msg').innerHTML = "नंबर आया: " + diceVal;
            canMove = true;
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function move(color, idx) {
            if (!canMove || color !== turn) return;
            const token = document.getElementById(`t-${color}-${idx}`);
            // ६ आने पर बाहर (Start Cells matched to color stars)
            if (positions[color][idx] === -1 && diceVal === 6) {
                const starts = { red:'14-7', blue:'7-2', yellow:'2-9', green:'9-14' };
                document.getElementById(`c-${starts[color]}`).appendChild(token);
                positions[color][idx] = 0;
                finish();
            } else if (positions[color][idx] !== -1) {
                // जम्प लॉजिक v33 में जोड़ेंगे
                finish();
            }
        }

        function finish() {
            canMove = false;
            if (diceVal !== 6) next();
            else document.getElementById('msg').innerHTML = "दोबारा पासा फेंकें!";
        }

        function next() {
            const order = ['red', 'green', 'yellow', 'blue'];
            document.getElementById(`u-${turn}`).classList.remove('active-p');
            turn = order[(order.indexOf(turn) + 1) % 4];
            document.getElementById(`u-${turn}`).classList.add('active-p');
            document.getElementById('msg').innerHTML = turn.toUpperCase() + " की बारी...";
            canMove = false;
        }

        window.onload = build;
    </script>
</body>
</html>
