<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Game UI</title>
    <style>
        /* CSS: पूरा डिजाइन यहाँ है */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #1a1a2e; /* गहरा नेवी ब्लू बैकग्राउंड */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* टॉप प्लेयर स्टेटस बॉक्स */
        .status-container {
            display: flex;
            justify-content: space-between;
            width: 360px;
            margin-bottom: 25px;
        }

        .player-box {
            border: 2px solid;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            width: 110px;
            text-align: center;
            font-size: 13px;
        }
        .p-blue { border-color: #3498db; }
        .p-yellow { border-color: #f1c40f; }

        /* मुख्य लूडो बोर्ड */
        .ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 360px;
            height: 360px;
            background-color: white;
            border: 10px solid #333; /* गहरा बाहरी बॉर्डर */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* होम एरिया (Homes) */
        .home { grid-column: span 6; grid-row: span 6; display: grid; grid-template-columns: 1fr 1fr; padding: 12px; }
        
        .red-home { background-color: #ff3e5e; }
        .yellow-home { background-color: #ffcc00; }
        .blue-home { background-color: #2e86c1; }
        .green-home { background-color: #27ae60; }

        /* गोटियों के लिए सफेद स्लॉट */
        .slot {
            background: radial-gradient(circle, #ffffff 40%, #dcdcdc 100%);
            border-radius: 50%;
            margin: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        /* सेंटर स्क्वायर (4 रंगों वाला) */
        .center-grid {
            grid-column: 7 / 10;
            grid-row: 7 / 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        /* तस्वीर के अनुसार रंगों का सटीक क्रम */
        .c-green { background-color: #27ae60; } /* टॉप-लेफ्ट */
        .c-red { background-color: #ff3e5e; }   /* टॉप-राइट */
        .c-yellow { background-color: #ffcc00; }/* बॉटम-लेफ्ट */
        .c-blue { background-color: #2e86c1; }  /* बॉटम-राइट */

        /* पासा (Dice) सेक्शन */
        .dice-section {
            margin-top: 40px;
            text-align: center;
        }

        .dice-wrapper {
            background: white;
            color: black;
            width: 85px;
            height: 85px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            margin: 10px auto;
            transition: 0.2s;
        }

        .dice-wrapper:active { transform: scale(0.9); }

        .result-text {
            font-size: 20px;
            color: #ffcc00; /* पीला टेक्स्ट जैसा तस्वीर में है */
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="player-box p-blue">
            🤖 कंप्यूटर <br> ⚔️ 0
        </div>
        <div class="player-box p-yellow">
            🤖 कंप्यूटर <br> ⚔️ 0
        </div>
    </div>

    <div class="ludo-board">
        <div class="home red-home">
            <div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div>
        </div>
        
        <div style="grid-column: 7/10; grid-row: 1/7; background: white;"></div>

        <div class="home yellow-home">
            <div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div>
        </div>

        <div style="grid-column: 1/7; grid-row: 7/10; background: white;"></div>

        <div class="center-grid">
            <div class="c-green"></div>
            <div class="c-red"></div>
            <div class="c-yellow"></div>
            <div class="c-blue"></div>
        </div>

        <div style="grid-column: 10/16; grid-row: 7/10; background: white;"></div>

        <div class="home blue-home"></div>

        <div style="grid-column: 7/10; grid-row: 10/16; background: white;"></div>

        <div class="home green-home"></div>
    </div>

    <div class="dice-section">
        <div class="dice-wrapper" id="dice" onclick="rollDice()">⚁</div>
        <div class="result-text">आया: <span id="val">2</span></div>
    </div>

    <script>
        // JavaScript: पासा फेंकने का लॉजिक
        function rollDice() {
            const diceIcons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            const random = Math.floor(Math.random() * 6) + 1;
            
            document.getElementById('dice').innerText = diceIcons[random - 1];
            document.getElementById('val').innerText = random;
        }
    </script>
</body>
</html>
