<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo - Royal Edition v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: radial-gradient(circle, #0f172a, #020617);
            --gold: #fbbf24;
            --red: #ef4444; --green: #22c55e; --blue: #3b82f6; --yellow: #facc15;
        }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #game-wrapper { width: 100%; max-width: 400px; text-align: center; }
        
        /* शाही बोर्ड डिजाइन */
        .board { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 95vw; height: 95vw; max-width: 380px; max-height: 380px; 
            background: white; margin: 15px auto; border: 6px solid #c5a059; border-radius: 12px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); position: relative;
        }

        .cell { border: 0.1px solid rgba(0,0,0,0.1); position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* घर और रास्ते (Paths) */
        .red { background: var(--red); } .green { background: var(--green); } 
        .blue { background: var(--blue); } .yellow { background: var(--yellow); }
        .path-red { background: #fee2e2; } .path-green { background: #dcfce7; }
        .path-blue { background: #dbeafe; } .path-yellow { background: #fef9c3; }

        /* गोटियाँ (Tokens) - प्रीमियम लुक */
        .token { 
            width: 75%; height: 75%; border-radius: 50%; border: 2px solid white; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 10; cursor: pointer;
            transition: transform 0.2s;
        }
        .token:active { transform: scale(1.3); }
        .red-t { background: radial-gradient(circle at 30% 30%, #ff8888, var(--red)); }
        .green-t { background: radial-gradient(circle at 30% 30%, #88ff88, var(--green)); }
        .blue-t { background: radial-gradient(circle at 30% 30%, #8888ff, var(--blue)); }
        .yellow-t { background: radial-gradient(circle at 30% 30%, #ffff88, var(--yellow)); }

        #dice-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #dice-btn { 
            width: 75px; height: 75px; background: white; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; font-size: 40px; color: #1e293b;
            box-shadow: 0 8px 0 #cbd5e1, 0 15px 20px rgba(0,0,0,0.5); cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <h1 style="color:var(--gold); margin-bottom: 5px;">👑 MY LUDO 👑</h1>
        <div id="board" class="board"></div>
        
        <div id="dice-area">
            <div id="dice-btn" onclick="roll()">🎲</div>
            <p id="msg" style="font-weight:bold">पासा फेंकें</p>
        </div>
    </div>

    <script>
        function init() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                let r = Math.floor(i/15), c = i%15;

                // 1. घर (Homes)
                if (r<6 && c<6) cell.classList.add('red');
                else if (r<6 && c>8) cell.classList.add('green');
                else if (r>8 && c<6) cell.classList.add('blue');
                else if (r>8 && c>8) cell.classList.add('yellow');

                // 2. शाही रास्ते (Paths)
                else if (r===7 && c>0 && c<7) cell.classList.add('red'); // Red path
                else if (c===7 && r>0 && r<7) cell.classList.add('green'); // Green path
                else if (c===7 && r>8 && r<14) cell.classList.add('yellow'); // Yellow path
                else if (r===7 && c>8 && c<14) cell.classList.add('blue'); // Blue path
                
                // 3. गोटियाँ रखना (Tokens)
                if ((r===2||r===3) && (c===2||c===3)) cell.innerHTML = '<div class="token red-t"></div>';
                if ((r===2||r===3) && (c===11||c===12)) cell.innerHTML = '<div class="token green-t"></div>';
                if ((r===11||r===12) && (c===2||c===3)) cell.innerHTML = '<div class="token blue-t"></div>';
                if ((r===11||r===12) && (c===11||c===12)) cell.innerHTML = '<div class="token yellow-t"></div>';

                board.appendChild(cell);
            }
        }

        let dVal = 0;
        function roll() {
            dVal = Math.floor(Math.random()*6)+1;
            const icons = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
            const btn = document.getElementById('dice-btn');
            btn.style.transform = "rotate(360deg)";
            setTimeout(() => {
                btn.innerHTML = icons[dVal];
                btn.style.transform = "rotate(0deg)";
                document.getElementById('msg').innerHTML = "नंबर आया: " + dVal;
                if(navigator.vibrate) navigator.vibrate(40);
            }, 200);
        }

        window.onload = init;
    </script>
</body>
</html>
