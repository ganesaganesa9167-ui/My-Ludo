<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo Royal v19 - Active Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. इंजीनियरिंग बेस (The Foundation) --- */
        :root {
            --red: #eb1c24; --green: #27ae60; --blue: #2980b9; --yellow: #f1c40f;
            --white: #ffffff; --black: #2c3e50; --gold: #d4af37; --bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }

        /* --- 2. प्रो-बोर्ड ढांचा (15x15 Grid) --- */
        .board {
            display: grid; 
            grid-template-columns: repeat(15, 1fr); 
            grid-template-rows: repeat(15, 1fr);
            width: 95vw; height: 95vw; max-width: 420px; max-height: 420px;
            background: var(--white); border: 10px solid var(--gold);
            border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        .c { border: 0.1px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; position: relative; }

        /* --- 3. शाही महल (The 4 Corner Bases) --- */
        .home { grid-column: span 6; grid-row: span 6; border: 1px solid #000; display: grid; grid-template-columns: repeat(2, 1fr); padding: 12%; gap: 10px; z-index: 5; }
        
        .red-h { grid-area: 1/1/7/7; background: var(--red); }
        .green-h { grid-area: 1/10/7/16; background: var(--green); }
        .blue-h { grid-area: 10/1/16/7; background: var(--blue); }
        .yellow-h { grid-area: 10/10/16/16; background: var(--yellow); }

        .slot { background: var(--white); border-radius: 50%; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 2px solid #333; }
        
        /* गोटियाँ (The Royal Tokens) */
        .token { 
            width: 85%; height: 85%; border-radius: 50%; border: 2px solid #fff; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 10; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .rt { background: radial-gradient(circle at 35% 35%, #ff4d4d, #990000); }
        .gt { background: radial-gradient(circle at 35% 35%, #4dff4d, #006600); }
        .bt { background: radial-gradient(circle at 35% 35%, #4d4dff, #000099); }
        .yt { background: radial-gradient(circle at 35% 35%, #ffff4d, #999900); }
        
        /* गोटे के चाल के लिए चमक (Token Glow) */
        .active-token { animation: tokenGlow 0.8s infinite alternate; border-color: gold; transform: scale(1.1); z-index: 100; }
        @keyframes tokenGlow { from { box-shadow: 0 0 5px gold; } to { box-shadow: 0 0 20px gold; } }

        /* --- 4. केंद्र (Center Finish Point) --- */
        .center-triangle {
            grid-area: 7/7/10/10; border: 2px solid #000; z-index: 20;
            background: conic-gradient(from 45deg, var(--yellow) 0deg 90deg, var(--blue) 90deg 180deg, var(--red) 180deg 270deg, var(--green) 270deg 360deg);
        }

        /* रास्तों के पक्के रंग (Precise Path Mapping) */
        .p-red { background: var(--red) !important; } .p-green { background: var(--green) !important; }
        .p-blue { background: var(--blue) !important; } .p-yellow { background: var(--yellow) !important; }
        
        /* ८ वैज्ञानिक सितारे (Safe Spots) */
        .star-spot { position: absolute; font-weight: bold; font-size: 1.4rem; color: #ffd700; z-index: 10; }
        .star-red { color: #eb1c24; } /* लाल सितारा */
        .star-green { color: #27ae60; } /* हरा सितारा */
        .star-blue { color: #2980b9; } /* नीला सितारा */
        .star-yellow { color: #f1c40f; } /* पीला सितारा */

        /* --- 5. शाही पासा और मेनू --- */
        .p-bar { width: 100%; display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(0,0,0,0.3); border-bottom: 2px solid var(--gold); }
        .p-box { background: rgba(0,0,0,0.5); border: 2px solid #555; border-radius: 8px; display: flex; align-items: center; padding: 5px 10px; gap: 8px; }
        
        .dice-area { width: 85px; height: 85px; background: #fff; border-radius: 18px; margin-top: 25px; display: flex; align-items: center; justify-content: center; font-size: 50px; color: #000; box-shadow: 0 10px 0 #94a3b8; cursor: pointer; }
    </style>
</head>
<body>

    <div class="p-bar">
        <div class="p-box" style="border-color:var(--blue)">
            <div style="width:30px; height:30px; background:#fff; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:20px;">🤖</div>
            <div style="font-size:11px;">कंप्यूटर<br>⚔️ 0 💀 0</div>
        </div>
        <div class="p-box" style="border-color:var(--green)">
            <div style="width:30px; height:30px; background:#fff; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:20px;">🤖</div>
            <div style="font-size:11px;">कंप्यूटर<br>⚔️ 0 💀 0</div>
        </div>
    </div>

    <h1 style="color:var(--gold); margin: 10px 0 0 0; font-size: 1.2rem; text-shadow: 2px 2px #000;">👑 MY LUDO - ROYAL 👑</h1>
    
    <div class="board" id="game-board">
        <div class="home red-h" id="red-base"></div>
        <div class="home green-h" id="green-base"></div>
        <div class="home blue-h" id="blue-base"></div>
        <div class="home yellow-h" id="yellow-base"></div>
        
        <div class="center-triangle"></div>
    </div>
    
    <div id="msg" style="margin-top:20px; font-weight:bold; color:var(--gold); font-size: 1.1rem; height: 25px;">पासा छुएं</div>
    <div class="dice-area" id="main-dice" onclick="rollDice()">🎲</div>

    <script>
        // --- गेम का दिमाग (Game Engine Variables) ---
        let diceVal = 0;
        let currentPlayer = 'red';
        let canMoveToken = false;
        const playerPaths = {
            red: ["cell-7-2", "cell-7-3", "cell-7-4", "cell-7-5", "cell-7-6", "cell-6-7", "cell-5-7", "cell-4-7", "cell-3-7", "cell-2-7", "cell-1-7", "cell-1-8", "cell-1-9", "cell-2-9", "cell-3-9", "cell-4-9", "cell-5-9", "cell-6-9", "cell-7-10", "cell-7-11", "cell-7-12", "cell-7-13", "cell-7-14", "cell-7-15", "cell-8-15", "cell-9-15", "cell-9-14", "cell-9-13", "cell-9-12", "cell-9-11", "cell-9-10", "cell-10-9", "cell-11-9", "cell-12-9", "cell-13-9", "cell-14-9", "cell-15-9", "cell-15-8", "cell-15-7", "cell-14-7", "cell-13-7", "cell-12-7", "cell-11-7", "cell-10-7", "cell-9-6", "cell-9-5", "cell-9-4", "cell-9-3", "cell-9-2", "cell-9-1", "cell-8-1", "cell-8-2", "cell-8-3", "cell-8-4", "cell-8-5", "cell-8-6", "cell-8-7"], // Finish
            // ... (बाकी रंगों के रास्ते अगले कोड में विस्तार से देंगे) ...
        };

        function initializeBoard() {
            const b = document.getElementById('game-board');
            for(let i=0; i<225; i++) {
                let r = Math.floor(i/15)+1, c = (i%15)+1;
                if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                    const cell = document.createElement('div');
                    cell.className = 'c cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.style.gridArea = `${r} / ${c}`;

                    // सटीक रास्ते की रंगाई
                    if (r === 8 && c >= 2 && c <= 6) cell.classList.add('p-red');
                    if (c === 8 && r >= 2 && r <= 6) cell.classList.add('p-green');
                    if (c === 8 && r >= 10 && r <= 14) cell.classList.add('p-blue');
                    if (r === 8 && c >= 10 && c <= 14) cell.classList.add('p-yellow');

                    b.appendChild(cell);
                }
            }
            renderColoredStars(); // रंगीन सितारों का विग्रह
            renderTokens(); // गोटियों की तैनाती
        }

        // --- द चाणक्य विग्रह Engine (v19) ---
        function renderColoredStars() {
            // ८ सुरक्षित स्थानों का गणितीय विन्यास और उनका रंग
            const starPoints = [
                { r: 7, c: 2, class: 'star-red' },    // लाल घर का सितारा
                { r: 9, c: 3, class: 'star-red' },    // लाल घर का सितारा
                { r: 2, c: 9, class: 'star-green' },  // हरे घर का सितारा
                { r: 3, c: 7, class: 'star-green' },  // हरे घर का सितारा
                { r: 14, c: 7, class: 'star-blue' },   // नीले घर का सितारा
                { r: 13, c: 9, class: 'star-blue' },   // नीले घर का सितारा
                { r: 9, c: 14, class: 'star-yellow' },  // पीले घर का सितारा
                { r: 7, c: 13, class: 'star-yellow' }   // पीले घर का सितारा
            ];

            starPoints.forEach(spot => {
                const targetCell = document.getElementById(`cell-${spot.r}-${spot.c}`);
                if (targetCell) {
                    const star = document.createElement('span');
                    star.className = `star-spot ${spot.class}`;
                    star.innerHTML = "★"; // पीला सितारा यूनिकोड
                    targetCell.appendChild(star);
                }
            });
        }

        function renderTokens() {
            ['red', 'green', 'blue', 'yellow'].forEach(color => {
                const base = document.getElementById(`${color}-base`);
                base.innerHTML = '';
                for(let i=0; i<4; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    const token = document.createElement('div');
                    token.className = `token ${color.charAt(0)}t`; // rt, gt, bt, yt
                    token.id = `token-${color}-${i}`;
                    token.onclick = (e) => handleTokenClick(color, token, e); // क्लिक लॉजिक
                    slot.appendChild(token);
                    base.appendChild(slot);
                }
            });
        }

        // पासा फेंकने का शाही लॉजिक
        function rollDice() {
            if (canMoveToken) return; // जब तक चाल न चले, दोबारा पासा नहीं
            diceVal = Math.floor(Math.random()*6)+1;
            const dice = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
            document.getElementById('main-dice').innerHTML = dice[diceVal];
            document.getElementById('msg').innerHTML = currentPlayer.toUpperCase() + " की बारी, नंबर आया: " + diceVal;
            
            canMoveToken = true;
            // गोटियों को चमकाएं ताकि यूजर को पता चले कि उसे क्या छूना है
            document.querySelectorAll(`.${currentPlayer.charAt(0)}t`).forEach(t => t.classList.add('active-token'));
            if(navigator.vibrate) navigator.vibrate(60);
        }

        // गोटी को चलाने का असली लॉजिक (v19)
        function handleTokenClick(color, token, e) {
            if (!canMoveToken || color !== currentPlayer) return;

            // नियम: ६ आने पर ही घर से बाहर निकलेंगे
            if (diceVal === 6 && token.parentElement.classList.contains('slot')) {
                const startCell = color === 'red' ? 'cell-7-2' : (color === 'green' ? 'cell-2-9' : (color === 'blue' ? 'cell-14-7' : 'cell-9-14'));
                document.getElementById(startCell).appendChild(token); // गोटी बाहर!
                document.getElementById('msg').innerHTML = "शाही गोटी मैदान में!";
            } else {
                alert("मैदान में गोटी को आगे बढ़ाने का पूरा लॉजिक 'गोटी जम्प' के साथ v20 में आ रहा है!");
            }

            // चाल पूरी, अगली बारी
            canMoveToken = false;
            document.querySelectorAll('.token').forEach(t => t.classList.remove('active-token'));
            // अगली बारी बदलें (testing only)
            // currentPlayer = (currentPlayer === 'red' ? 'green' : 'red');
        }

        window.onload = initializeBoard;
    </script>
</body>
</html>
