<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo Royal v19 - Movement Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --r: #eb1c24; --g: #27ae60; --b: #2980b9; --y: #f1c40f; --gold: #d4af37; }
        body { background: #0f172a; color: white; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .ludo-board {
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            width: 95vw; height: 95vw; max-width: 420px; max-height: 420px;
            background: #fff; border: 10px solid var(--gold); border-radius: 12px; box-shadow: 0 15px 40px #000; position: relative;
        }

        .cell { border: 0.1px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; position: relative; }

        /* शाही घर */
        .home { grid-column: span 6; grid-row: span 6; display: grid; grid-template-columns: repeat(2, 1fr); padding: 12%; gap: 15px; border: 1px solid #000; z-index: 5; }
        .red { grid-area: 1/1/7/7; background: var(--r); }
        .green { grid-area: 1/10/7/16; background: var(--g); }
        .blue { grid-area: 10/1/16/7; background: var(--b); }
        .yellow { grid-area: 10/10/16/16; background: var(--y); }

        .slot { background: #fff; border-radius: 50%; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 2px solid #333; }
        
        /* गोटियाँ और उनकी चमक */
        .token { 
            width: 85%; height: 85%; border-radius: 50%; border: 2px solid #fff; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 100; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .rt { background: radial-gradient(circle at 35% 35%, #ff4d4d, #990000); }
        .gt { background: radial-gradient(circle at 35% 35%, #4dff4d, #006600); }
        
        .active-token { animation: glow 0.8s infinite alternate; transform: scale(1.1); }
        @keyframes glow { from { box-shadow: 0 0 5px gold; } to { box-shadow: 0 0 20px gold; } }

        .center { grid-area: 7/7/10/10; border: 2px solid #000; z-index: 10; background: conic-gradient(from 45deg, var(--y) 0deg 90deg, var(--b) 90deg 180deg, var(--r) 180deg 270deg, var(--g) 270deg 360deg); }

        .p-r { background: var(--r); } .p-g { background: var(--g); }
        .p-b { background: var(--b); } .p-y { background: var(--y); }
        .star { background: #e2e8f0; font-weight: bold; color: #1e293b; }

        #dice-box { width: 85px; height: 85px; background: #fff; border-radius: 18px; margin-top: 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; color: #000; box-shadow: 0 8px 0 #94a3b8; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="color:var(--gold); margin-bottom: 10px;">👑 MY LUDO - PRO v19 👑</h1>
    
    <div class="ludo-board" id="board">
        <div class="home red" id="red-base"></div>
        <div class="home green" id="green-base"></div>
        <div class="home blue" id="blue-base"></div>
        <div class="home yellow" id="yellow-base"></div>
        <div class="center"></div>
    </div>

    <div id="dice-box" onclick="roll()">🎲</div>
    <p id="msg" style="margin-top:10px; font-weight:bold; color:var(--gold)">पासा फेंकें</p>

    <script>
        let diceVal = 0;
        let canMove = false;
        let currentPlayer = 'red';

        function init() {
            const b = document.getElementById('board');
            const stars = [{r:7,c:2},{r:9,c:3},{r:2,c:9},{r:3,c:7},{r:9,c:14},{r:7,c:13},{r:14,c:7},{r:13,c:9}];
            
            for(let i=0; i<225; i++) {
                let r=Math.floor(i/15)+1, c=(i%15)+1;
                if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.style.gridArea = `${r}/${c}`;

                    if (r===8 && c>=2 && c<=6) cell.classList.add('p-r');
                    if (c===8 && r>=2 && r<=6) cell.classList.add('p-g');
                    if (c===8 && r>=10 && r<=14) cell.classList.add('p-b');
                    if (r===8 && c>=10 && c<=14) cell.classList.add('p-y');
                    if (stars.some(s=>s.r===r && s.c===c)) { cell.innerHTML="⭐"; cell.classList.add('star'); }
                    b.appendChild(cell);
                }
            }
            setupTokens();
        }

        function setupTokens() {
            ['red', 'green', 'blue', 'yellow'].forEach(color => {
                const base = document.getElementById(`${color}-base`);
                base.innerHTML = '';
                for(let i=0; i<4; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    const token = document.createElement('div');
                    token.className = `token ${color.charAt(0)}t`;
                    token.id = `token-${color}-${i}`;
                    token.onclick = (e) => handleTokenClick(color, token, e);
                    slot.appendChild(token);
                    base.appendChild(slot);
                }
            });
        }

        function roll() {
            if (canMove) return;
            diceVal = Math.floor(Math.random()*6)+1;
            document.getElementById('dice-box').innerHTML = ["","⚀","⚁","⚂","⚃","⚄","⚅"][diceVal];
            document.getElementById('msg').innerHTML = "नंबर आया: " + diceVal;
            
            canMove = true;
            document.querySelectorAll(`.${currentPlayer.charAt(0)}t`).forEach(t => t.classList.add('active-token'));
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function handleTokenClick(color, token, e) {
            if (!canMove || color !== currentPlayer) return;

            // नियम: 6 आने पर घर से बाहर निकलना
            if (diceVal === 6 && token.parentElement.classList.contains('slot')) {
                const startPos = color === 'red' ? 'cell-7-2' : (color === 'green' ? 'cell-2-9' : (color === 'blue' ? 'cell-14-7' : 'cell-9-14'));
                document.getElementById(startPos).appendChild(token);
                endTurn();
            } 
            // मैदान में गोटी को आगे बढ़ाना (अभी इसे सिर्फ १ डब्बा जम्प दे रहे हैं टेस्टिंग के लिए)
            else if (!token.parentElement.classList.contains('slot')) {
                alert("गोटी आगे बढ़ रही है!"); 
                endTurn();
            }
        }

        function endTurn() {
            canMove = false;
            document.querySelectorAll('.token').forEach(t => t.classList.remove('active-token'));
            document.getElementById('msg').innerHTML = "अगली चाल...";
            // यहाँ हम बारी बदल सकते हैं: currentPlayer = (currentPlayer === 'red' ? 'green' : 'red');
        }

        window.onload = init;
    </script>
</body>
</html>
