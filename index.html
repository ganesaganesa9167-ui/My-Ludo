<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo Pro v26 - Ultra Precision</title>
    <style>
        :root {
            --red: #ff3e3e; --green: #2ecc71; --blue: #3498db; --yellow: #f1c40f;
            --bg: #4b3d91; --dark: #312651; --gold: #ffd700;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; color: white; overflow: hidden; }

        /* --- 1. प्लेयर यूआई (Header & Footer UI) --- */
        .player-bar { width: 100%; display: flex; justify-content: space-between; padding: 10px 20px; }
        .player-box { background: rgba(0,0,0,0.3); border: 2px solid var(--gold); border-radius: 10px; display: flex; align-items: center; padding: 5px 10px; gap: 10px; position: relative; }
        .avatar { width: 40px; height: 40px; background: #fff; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 25px; }
        .score-box { font-size: 12px; line-height: 1.2; }

        /* --- 2. शाही बोर्ड (The Professional Board) --- */
        .board-wrapper { position: relative; width: 98vw; height: 98vw; max-width: 420px; max-height: 420px; background: #fff; border: 8px solid #333; border-radius: 5px; display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .cell { border: 0.1px solid #ccc; display: flex; align-items: center; justify-content: center; position: relative; }

        /* बड़े घर (6x6) */
        .home { grid-column: span 6; grid-row: span 6; border: 1px solid #000; display: grid; grid-template-columns: repeat(2, 1fr); padding: 10%; gap: 10px; }
        .blue-h { grid-area: 1/1/7/7; background: var(--blue); }
        .yellow-h { grid-area: 1/10/7/16; background: var(--yellow); }
        .red-h { grid-area: 10/1/16/7; background: var(--red); }
        .green-h { grid-area: 10/10/16/16; background: var(--green); }
        
        .slot { background: rgba(0,0,0,0.2); border-radius: 50%; width: 100%; height: 100%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; }
        .token { width: 80%; height: 80%; border-radius: 50%; border: 2px solid white; box-shadow: 0 4px 8px #000; }
        .bt { background: radial-gradient(circle, #5dade2, #1b4f72); }
        .yt { background: radial-gradient(circle, #f7dc6f, #b7950b); }
        .rt { background: radial-gradient(circle, #ec7063, #7b241c); }
        .gt { background: radial-gradient(circle, #58d68d, #186a3b); }

        /* केंद्र (Center Finish) */
        .center { grid-area: 7/7/10/10; background: conic-gradient(from 45deg, var(--yellow) 0deg 90deg, var(--green) 90deg 180deg, var(--red) 180deg 270deg, var(--blue) 270deg 360deg); border: 2px solid #000; z-index: 20; }

        /* पक्के रास्ते (Path Mapping as per reference) */
        .p-blue { background: var(--blue) !important; } .p-yellow { background: var(--yellow) !important; }
        .p-red { background: var(--red) !important; } .p-green { background: var(--green) !important; }
        
        /* सितारों की कोडिंग (Star Shapes) */
        .star { font-size: 1.2rem; filter: drop-shadow(0 0 2px #000); }
        .blue-s { color: var(--blue); } .red-s { color: var(--red); }
        .green-s { color: var(--green); } .yellow-s { color: var(--yellow); }

        /* --- 3. कंट्रोल पैनल (Bottom Menu) --- */
        .bottom-bar { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 15px; background: var(--dark); border-top: 2px solid var(--gold); }
        .btn { width: 50px; height: 50px; background: #2ecc71; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 0 #1b7e46; cursor: pointer; }
        .dice-btn { width: 70px; height: 70px; background: #fff; border-radius: 15px; color: #000; font-size: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 0 #bdc3c7; }
    </style>
</head>
<body>

    <div class="player-bar">
        <div class="player-box" style="border-color:var(--blue)">
            <div class="avatar">🤖</div>
            <div class="score-box">कम्यूटर<br>⚔️ 0 💀 0</div>
        </div>
        <div class="player-box" style="border-color:var(--yellow)">
            <div class="avatar">🤖</div>
            <div class="score-box">कम्यूटर<br>⚔️ 0 💀 0</div>
        </div>
    </div>

    <div class="board-wrapper" id="ludo-board">
        <div class="home blue-h"><div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div></div>
        <div class="home yellow-h"><div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div></div>
        <div class="home red-h"><div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div></div>
        <div class="home green-h"><div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div></div>
        <div class="center"></div>
    </div>

    <div class="player-bar">
        <div class="player-box" style="border-color:var(--red)">
            <div class="avatar">👨</div>
            <div class="score-box">खिलाड़ी<br>⚔️ 0 💀 0</div>
            <div style="position:absolute; right:-25px; font-size:25px;">👉</div>
        </div>
        <div class="player-box" style="border-color:var(--green)">
            <div class="avatar">🤖</div>
            <div class="score-box">कम्यूटर<br>⚔️ 0 💀 0</div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="btn" style="background:#e74c3c; box-shadow: 0 4px 0 #922b21;">❮</div>
        <div class="dice-btn" id="main-dice" onclick="roll()">🎲</div>
        <div class="btn">🏃</div>
        <div class="btn" style="background:#34495e; box-shadow: 0 4px 0 #1c2833;">⚙️</div>
    </div>

    <script>
        function renderProBoard() {
            const b = document.getElementById('ludo-board');
            for(let r=1; r<=15; r++) {
                for(let c=1; c<=15; c++) {
                    if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.style.gridArea = `${r} / ${c}`;

                        // --- सटीक रंगीन रास्ते (As per Professional Reference) ---
                        if (r === 8 && c >= 2 && c <= 6) cell.classList.add('p-blue'); // Blue Path (Left)
                        if (c === 8 && r >= 2 && r <= 6) cell.classList.add('p-yellow'); // Yellow Path (Top)
                        if (c === 8 && r >= 10 && r <= 14) cell.classList.add('p-red'); // Red Path (Bottom)
                        if (r === 8 && c >= 10 && c <= 14) cell.classList.add('p-green'); // Green Path (Right)

                        // --- रंगीन सितारे (Colored Stars) ---
                        if(r===7 && c===2) { cell.innerHTML="★"; cell.classList.add('star','blue-s'); }
                        if(r===2 && c===9) { cell.innerHTML="★"; cell.classList.add('star','yellow-s'); }
                        if(r===14 && c===7) { cell.innerHTML="★"; cell.classList.add('star','red-s'); }
                        if(r===9 && c===14) { cell.innerHTML="★"; cell.classList.add('star','green-s'); }
                        
                        // सफेद सेफ स्टार्स
                        if((r===9 && c===3) || (r===3 && c===7) || (r===7 && c===13) || (r===13 && c===9)) {
                            cell.innerHTML="★"; cell.classList.add('star'); cell.style.color="#ccc";
                        }

                        b.appendChild(cell);
                    }
                }
            }
        }

        function roll() {
            const v = Math.floor(Math.random()*6)+1;
            const dice = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
            document.getElementById('main-dice').innerHTML = dice[v];
            if(navigator.vibrate) navigator.vibrate(50);
        }

        window.onload = renderProBoard;
    </script>
</body>
</html>
