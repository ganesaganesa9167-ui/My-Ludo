<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लूडो गेम बोर्ड UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="header-container">
            <div class="score-card player1">
                <img src="images/robot.png" alt="कंप्यूटर" class="player-icon">
                <span class="player-name">कंप्यूटर</span>
                <span class="tokens-left">⚔ 0</span>
            </div>
            <div class="score-card player2">
                <img src="images/robot.png" alt="कंप्यूटर" class="player-icon">
                <span class="player-name">कंप्यूटर</span>
                <span class="tokens-left">⚔ 0</span>
            </div>
        </div>

        <div class="ludo-board">
            <div class="base blue-base">
                <div class="token blue-token"></div>
                <div class="token blue-token"></div>
                <div class="token blue-token"></div>
                <div class="token blue-token"></div>
            </div>

            <div class="base yellow-base">
                <div class="token yellow-token"></div>
                <div class="token yellow-token"></div>
                <div class="token yellow-token"></div>
                <div class="token yellow-token"></div>
            </div>

            <div class="finish-square">
                <div class="blue-part"></div>
                <div class="yellow-part"></div>
                <div class="green-part"></div>
                <div class="red-part"></div>
            </div>

            <div class="base red-base">
                <div class="token red-token"></div>
                <div class="token red-token"></div>
                <div class="token red-token"></div>
                <div class="token red-token"></div>
            </div>

            <div class="base green-base">
                <div class="token green-token"></div>
                <div class="token green-token"></div>
                <div class="token green-token"></div>
                <div class="token green-token"></div>
            </div>

            <div class="grid-cell" style="grid-column: 7; grid-row: 1;"></div> <div class="grid-cell" style="grid-column: 8; grid-row: 1;"></div>
            <div class="grid-cell" style="grid-column: 9; grid-row: 1;"></div>
            </div>

        <div class="footer-container">
            <div class="score-card player3 active-player">
                <img src="images/person.png" alt="खिलाड़ी" class="player-icon">
                <span class="player-name">खिलाड़ी (लाल)</span>
                <span class="tokens-left">⚔ 0</span>
            </div>
            <div class="score-card player4">
                <img src="images/robot.png" alt="कंप्यूटर" class="player-icon">
                <span class="player-name">कंप्यूटर</span>
                <span class="tokens-left">⚔ 0</span>
            </div>
        </div>

        <div class="controls-container">
            <img src="images/dice-icon.png" alt="पासा" class="dice-icon">
            <div class="dice">5</div>
        </div>
    </div>
</body>
    </html>
