<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo Royal v15</title>
    <style>
        :root { --r: #d00000; --g: #008000; --b: #0000ff; --y: #ffcc00; --gold: #ffd700; }
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .board {
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            width: 95vw; height: 95vw; max-width: 400px; max-height: 400px;
            background: #fff; border: 8px solid #c5a059; border-radius: 12px; box-shadow: 0 0 50px #000;
        }

        .cell { border: 0.1px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; position: relative; }

        /* कोनों के घर */
        .home { grid-column: span 6; grid-row: span 6; display: grid; grid-template-columns: repeat(2, 1fr); padding: 12%; gap: 10px; border: 1px solid #000; }
        .red { grid-area: 1/1/7/7; background: var(--r); }
        .green { grid-area: 1/10/7/16; background: var(--g); }
        .blue { grid-area: 10/1/16/7; background: var(--b); }
        .yellow { grid-area: 10/10/16/16; background: var(--y); }
        
        .slot { background: #fff; border-radius: 50%; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .token { width: 80%; height: 80%; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px #000; }
        .rt { background: radial-gradient(circle, #ff5555, #800000); }
        .gt { background: radial-gradient(circle, #55ff55, #004d00); }
        .bt { background: radial-gradient(circle, #5555ff, #000080); }
        .yt { background: radial-gradient(circle, #ffff55, #806600); }

        .center { grid-area: 7/7/10/10; border: 2px solid #000; background: conic-gradient(from 45deg, var(--y) 0deg 90deg, var(--b) 90deg 180deg, var(--r) 180deg 270deg, var(--g) 270deg 360deg); }

        .p-r { background: var(--r); } .p-g { background: var(--g); }
        .p-b { background: var(--b); } .p-y { background: var(--y); }
        .star { background: #cbd5e1; font-weight: bold; color: #000; font-size: 14px; }

        #dice { width: 80px; height: 80px; background: #fff; border-radius: 12px; margin-top: 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; color: #000; font-weight: bold; box-shadow: 0 8px 0 #94a3b8; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="color:var(--gold); margin: 10px; font-size: 1.2rem;">👑 MY LUDO v15 👑</h1>
    
    <div class="board" id="main-board">
        <div class="home red">
            <div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div>
            <div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div>
        </div>
        <div class="home green">
            <div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div>
            <div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div>
        </div>
        <div class="home blue">
            <div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div>
            <div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div>
        </div>
        <div class="home yellow">
            <div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div>
            <div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div>
        </div>
        <div class="center"></div>
    </div>
    
    <div id="dice" onclick="roll()">🎲</div>
    <p id="msg" style="margin-top:10px; font-weight:bold; color:var(--gold)">पासा फेंकें</p>

    <script>
        function createCells() {
            const b = document.getElementById('main-board');
            const stars = [{r:7,c:2},{r:9,c:3},{r:2,c:9},{r:3,c:7},{r:9,c:14},{r:7,c:13},{r:14,c:7},{r:13,c:9}];
            
            for(let i=0; i<225; i++) {
                let r = Math.floor(i/15)+1, c = (i%15)+1;
                // Only render if not in home area or center
                if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.gridArea = `${r}/${c}`;
                    
                    if (r===8 && c>=2 && c<=6) cell.classList.add('p-r');
                    if (c===8 && r>=2 && r<=6) cell.classList.add('p-g');
                    if (c===8 && r>=10 && r<=14) cell.classList.add('p-b');
                    if (r===8 && c>=10 && c<=14) cell.classList.add('p-y');
                    
                    if (stars.some(s=>s.r===r && s.c===c)) { cell.innerHTML="⭐"; cell.classList.add('star'); }
                    b.appendChild(cell);
                }
            }
        }

        function roll() {
            const v = Math.floor(Math.random()*6)+1;
            const d = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
            document.getElementById('dice').innerHTML = d[v];
            document.getElementById('msg').innerHTML = "नंबर आया: " + v;
            if(navigator.vibrate) navigator.vibrate(50);
        }

        window.onload = createCells;
    </script>
</body>
</html>
