<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Royal v35 - Concrete Fix</title>
    <style>
        :root { --r:#ff3e3e; --g:#2ecc71; --b:#3498db; --y:#f1c40f; --gold:#ffd700; --bg:#1a142e; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color:white; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; justify-content:space-between; }

        /* प्लेयर प्रोफाइल बॉक्स - सटीक फिक्स */
        .p-bar { width:100%; display:flex; justify-content:space-between; padding:10px 15px; z-index: 50; }
        .p-box { background:rgba(0,0,0,0.6); border:2px solid #555; border-radius:8px; display:flex; align-items:center; padding:6px 10px; gap:8px; min-width:120px; }
        .active-p { border-color:var(--gold); box-shadow: 0 0 15px var(--gold); background: rgba(255,215,0,0.1); }
        .av { width:35px; height:35px; background:#fff; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:22px; }

        /* --- 15x15 का वज्र ढांचा (No-Loop CSS Grid) --- */
        .board { 
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            width:98vw; height:98vw; max-width:420px; max-height:420px;
            background:#fff; border:8px solid #333; box-shadow:0 10px 50px #000; position:relative;
        }
        .c { border:0.5px solid #ddd; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; background: #fff; }

        /* शाही घर (Bases) */
        .base { grid-column: span 6; grid-row: span 6; display:grid; grid-template-columns:repeat(2,1fr); padding:10%; gap:12px; border:1px solid #000; z-index:10; }
        .b-blue { grid-area:1/1/7/7; background:var(--b); }
        .b-yellow { grid-area:1/10/7/16; background:var(--y); }
        .b-red { grid-area:10/1/16/7; background:var(--r); } /* खिलाड़ी */
        .b-green { grid-area:10/10/16/16; background:var(--g); }

        .slot { background:rgba(0,0,0,0.2); border-radius:50%; width:100%; height:100%; border:2px solid #fff; display:flex; align-items:center; justify-content:center; }
        .token { width:80%; height:80%; border-radius:50%; border:2px solid #fff; box-shadow:0 4px 8px #000; cursor:pointer; z-index:100; }
        .rt { background:radial-gradient(circle, #ff6b6b, #800); }
        .bt { background:radial-gradient(circle, #4dabf7, #00008b); }
        .yt { background:radial-gradient(circle, #fcc419, #997300); }
        .gt { background:radial-gradient(circle, #51cf66, #006400); }

        .center { grid-area:7/7/10/10; background:conic-gradient(from 45deg, var(--y) 0deg 90deg, var(--g) 90deg 180deg, var(--r) 180deg 270deg, var(--b) 270deg 360deg); border:1px solid #000; z-index:20; }

        /* रास्तों की सटीक कोडिंग (Manually applied to grid) */
        .p-r { background:var(--r)!important; } .p-g { background:var(--g)!important; }
        .p-b { background:var(--b)!important; } .p-y { background:var(--y)!important; }
        
        .star { font-size:1.4rem; font-weight:bold; line-height:1; }
        .active-token { animation: jump 0.6s infinite alternate; }
        @keyframes jump { from { transform:scale(1); } to { transform:scale(1.15); box-shadow:0 0 15px gold; } }

        /* पासा कंट्रोल - जो अब कभी नहीं छिपेगा */
        .footer { width:100%; display:flex; flex-direction:column; align-items:center; padding:15px; background:#120d24; border-top:2px solid var(--gold); z-index: 100; }
        .dice { width:75px; height:75px; background:#fff; border-radius:15px; color:#000; font-size:48px; display:flex; align-items:center; justify-content:center; box-shadow: 0 8px 0 #94a3b8; cursor:pointer; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="p-bar">
        <div class="p-box" id="u-blue" style="border-color:var(--b)"><div class="av">🤖</div><div style="font-size:10px;">कंप्यूटर<br>⚔️ 0</div></div>
        <div class="p-box" id="u-yellow" style="border-color:var(--y)"><div class="av">🤖</div><div style="font-size:10px;">कंप्यूटर<br>⚔️ 0</div></div>
    </div>

    <div class="board" id="main-board">
        <div class="base b-blue"><div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div><div class="slot"><div class="token bt"></div></div></div>
        <div class="base b-yellow"><div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div><div class="slot"><div class="token yt"></div></div></div>
        <div class="base b-red"><div class="slot"><div class="token rt" id="red-t-1" onclick="moveRed()"></div></div><div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div><div class="slot"><div class="token rt"></div></div></div>
        <div class="base b-green"><div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div><div class="slot"><div class="token gt"></div></div></div>
        <div class="center"></div>

        </div>

    <div class="p-bar">
        <div class="p-box active-p" id="u-red" style="border-color:var(--r)"><div class="av">👨</div><div style="font-size:10px;">खिलाड़ी (लाल)<br>⚔️ 0</div></div>
        <div class="p-box" id="u-green" style="border-color:var(--g)"><div class="av">🤖</div><div style="font-size:10px;">कंप्यूटर<br>⚔️ 0</div></div>
    </div>

    <div class="footer">
        <div class="dice" id="dice" onclick="rollDice()">🎲</div>
        <p id="msg" style="color:var(--gold); font-weight:bold;">पासा छुएं</p>
    </div>

    <script>
        let diceVal = 0, canMove = false;
        // लाल खिलाडी का पक्का रास्ता
        const redPath = ["14-8","13-8","12-8","11-8","10-8"]; 

        function buildPath() {
            const b = document.getElementById('main-board');
            const cStars = { "14-7":"var(--r)", "7-2":"var(--b)", "2-9":"var(--y)", "9-14":"var(--g)" };
            
            for(let r=1; r<=15; r++) {
                for(let c=1; c<=15; c++) {
                    if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                        const cell = document.createElement('div');
                        cell.className = 'c'; cell.id = `c-${r}-${c}`; cell.style.gridArea = `${r}/${c}`;
                        
                        // पक्की रंगाई (Manual Matching)
                        if (c===8 && r>=10 && r<=14) cell.classList.add('p-red');
                        if (r===8 && c>=2 && c<=6) cell.classList.add('p-blue');
                        if (c===8 && r>=2 && r<=6) cell.classList.add('p-yellow');
                        if (r===8 && c>=10 && c<=14) cell.classList.add('p-green');

                        const pos = `${r}-${c}`;
                        if (cStars[pos]) { cell.innerHTML="★"; cell.style.color=cStars[pos]; cell.classList.add('star'); }
                        b.appendChild(cell);
                    }
                }
            }
        }

        function rollDice() {
            if (canMove) return;
            diceVal = Math.floor(Math.random()*6)+1;
            document.getElementById('dice').innerHTML = ["","⚀","⚁","⚂","⚃","⚄","⚅"][diceVal];
            document.getElementById('msg').innerHTML = "नंबर आया: " + diceVal;
            if (diceVal === 6) {
                canMove = true;
                document.getElementById('red-t-1').classList.add('active-token');
            } else {
                setTimeout(() => { document.getElementById('msg').innerHTML = "६ आने पर ही गोटी निकलेगी!"; }, 500);
            }
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function moveRed() {
            if (!canMove) return;
            const token = document.getElementById('red-t-1');
            const startCell = document.getElementById('c-14-7');
            startCell.appendChild(token);
            token.classList.remove('active-token');
            canMove = false;
            document.getElementById('msg').innerHTML = "शानदार! गोटी बाहर आ गई।";
        }

        window.onload = buildPath;
    </script>
</body>
</html>
