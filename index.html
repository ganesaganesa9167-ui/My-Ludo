<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ludo - Royal Premium v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- प्रीमियम रॉयल डिजाइन (CSS) --- */
        :root {
            --bg: radial-gradient(circle, #1e293b, #0f172a);
            --gold: linear-gradient(145deg, #f59e0b, #d97706);
            --red: #ef4444; --green: #22c55e; --blue: #3b82f6; --yellow: #facc15;
        }

        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }

        #splash-screen { position: fixed; inset: 0; background: #0f172a; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        .logo { font-size: 3rem; color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.6); font-family: 'Rajdhani'; }

        #game-wrapper { width: 100%; max-width: 400px; text-align: center; display: none; } /* शुरू में छुपा रहेगा */

        .board { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 95vw; height: 95vw; max-width: 380px; max-height: 380px; 
            background: white; margin: 20px auto; border: 6px solid #c5a059; border-radius: 10px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .cell { border: 0.1px solid rgba(0,0,0,0.05); position: relative; }
        .red { background: var(--red); } .green { background: var(--green); } 
        .blue { background: var(--blue); } .yellow { background: var(--yellow); }

        #dice-btn { 
            width: 80px; height: 80px; background: white; margin: 20px auto; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; font-size: 45px; color: #1e293b;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); cursor: pointer; active: transform: scale(0.9);
        }

        /* गोटियाँ */
        .token { width: 80%; height: 80%; border-radius: 50%; border: 2px solid white; margin: 10%; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="logo">MY LUDO</h1>
        <p>शाही दरबार सज रहा है...</p>
    </div>

    <div id="game-wrapper">
        <h1 style="color:#fbbf24">👑 MY LUDO 👑</h1>
        <div id="board" class="board"></div>
        <div id="dice-btn" onclick="roll()">🎲</div>
        <p id="msg">पासा फेंकें</p>
    </div>

    <script>
        // --- चाणक्य इंजन (JavaScript) ---
        function init() {
            const board = document.getElementById('board');
            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                let r = Math.floor(i/15), c = i%15;

                if (r<6 && c<6) cell.classList.add('red');
                if (r<6 && c>8) cell.classList.add('green');
                if (r>8 && c<6) cell.classList.add('blue');
                if (r>8 && c>8) cell.classList.add('yellow');

                board.appendChild(cell);
            }

            // ३ सेकंड बाद पर्दा हटाओ
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('game-wrapper').style.display = 'block';
                }, 800);
            }, 3000);
        }

        function roll() {
            const v = Math.floor(Math.random()*6)+1;
            const icons = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
            document.getElementById('dice-btn').innerHTML = icons[v];
            document.getElementById('msg').innerHTML = "नंबर आया: " + v;
            if(navigator.vibrate) navigator.vibrate(50);
        }

        window.onload = init;
    </script>
</body>
</html>
