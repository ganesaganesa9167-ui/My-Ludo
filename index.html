<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiv Shakti Ludo UI</title>
    <style>
        /* CSS: डिजाइन और लेआउट */
        body {
            background-color: #1a1a2e; /* गहरा बैकग्राउंड जैसा तस्वीर में है */
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* टॉप प्लेयर स्टेटस */
        .players-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        .player-box {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .blue-box { border-color: #3498db; background: rgba(52, 152, 219, 0.1); }
        .yellow-box { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); }

        /* लूडो बोर्ड */
        .ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 90vw;
            max-width: 450px;
            height: 90vw;
            max-height: 450px;
            background: #fff;
            border: 10px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* घर (Home Squares) */
        .home { grid-column: span 6; grid-row: span 6; display: grid; grid-template-columns: 1fr 1fr; padding: 15%; }
        .red { background: radial-gradient(#ff4b2b, #ff416c); }
        .yellow { background: #ffcc00; grid-column: 10 / span 6; }
        .blue { background: #2980b9; grid-row: 10 / span 6; }
        .green { background: #27ae60; grid-column: 10 / span 6; grid-row: 10 / span 6; }

        .token-slot {
            background: white;
            border-radius: 50%;
            margin: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* सेंटर स्क्वायर */
        .center-square {
            grid-column: 7 / span 3;
            grid-row: 7 / span 3;
            background: conic-gradient(#ff416c 25%, #2980b9 0 50%, #ffcc00 0 75%, #27ae60 0);
        }

        /* पासा (Dice) सेक्शन */
        .dice-container {
            margin-top: 30px;
            text-align: center;
        }

        .dice-visual {
            background: white;
            color: black;
            font-size: 40px;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            margin: 10px auto;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .dice-visual:active { transform: scale(0.9); }

        .result-text { font-weight: bold; color: #ffcc00; font-size: 18px; }

    </style>
</head>
<body>

    <div class="players-header">
        <div class="player-box blue-box">🤖 कंप्यूटर <br> ⚔️ 0</div>
        <div class="player-box yellow-box">🤖 कंप्यूटर <br> ⚔️ 0</div>
    </div>

    <div class="ludo-board">
        <div class="home red">
            <div class="token-slot"></div><div class="token-slot"></div>
            <div class="token-slot"></div><div class="token-slot"></div>
        </div>
        
        <div class="center-square"></div>

        <div class="home yellow">
            <div class="token-slot"></div><div class="token-slot"></div>
            <div class="token-slot"></div><div class="token-slot"></div>
        </div>

        <div class="home blue"></div>
        <div class="home green"></div>
    </div>

    <div class="dice-container">
        <div class="dice-visual" id="dice" onclick="rollDice()">⚄</div>
        <p class="result-text">आया: <span id="val">5</span></p>
    </div>

    <script>
        // JavaScript: लॉजिक
        function rollDice() {
            const diceElement = document.getElementById('dice');
            const valElement = document.getElementById('val');
            
            // पासे के चेहरे (Unicode characters)
            const icons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            
            // 1 से 6 के बीच रैंडम नंबर
            const randomNum = Math.floor(Math.random() * 6) + 1;
            
            // UI अपडेट करना
            diceElement.innerText = icons[randomNum - 1];
            valElement.innerText = randomNum;

            // थोड़ा एनीमेशन इफेक्ट
            diceElement.style.transform = "rotate(360deg)";
            setTimeout(() => {
                diceElement.style.transform = "rotate(0deg)";
            }, 200);
        }
    </script>

</body>
</html>
