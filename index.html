<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiv Shakti Ludo - Updated</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #1b1b32; /* डार्क नेवी ब्लू जैसा इमेज में है */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white;
        }

        /* टॉप स्टेटस बार */
        .status-container {
            display: flex;
            justify-content: space-between;
            width: 350px;
            margin-bottom: 20px;
        }

        .player-status {
            border: 2px solid;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            text-align: center;
            font-size: 14px;
        }
        .blue-status { border-color: #3498db; }
        .yellow-status { border-color: #f1c40f; }

        /* मुख्य लूडो बोर्ड */
        .ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 350px;
            height: 350px;
            background-color: white;
            border: 8px solid #333;
            position: relative;
        }

        /* बड़े घर (Home Areas) */
        .home { grid-column: span 6; grid-row: span 6; display: grid; grid-template-columns: 1fr 1fr; padding: 15px; }
        
        .red-home { background-color: #ff3e5e; grid-column: 1 / 7; grid-row: 1 / 7; }
        .yellow-home { background-color: #ffcc00; grid-column: 10 / 16; grid-row: 1 / 7; }
        .blue-home { background-color: #2e86c1; grid-column: 1 / 7; grid-row: 10 / 16; }
        .green-home { background-color: #27ae60; grid-column: 10 / 16; grid-row: 10 / 16; }

        /* गोटियों के स्लॉट (सफेद घेरे) */
        .slot {
            background: radial-gradient(circle, #ffffff, #e0e0e0);
            border-radius: 50%;
            margin: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* सेंटर 2x2 ग्रिड */
        .center-box {
            grid-column: 7 / 10;
            grid-row: 7 / 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .c-green { background-color: #27ae60; }
        .c-red { background-color: #ff3e5e; }
        .c-yellow { background-color: #ffcc00; }
        .c-blue { background-color: #2e86c1; }

        /* पासा (Dice) सेक्शन */
        .dice-area {
            margin-top: 30px;
            text-align: center;
        }

        .dice-box {
            background: white;
            color: black;
            width: 70px;
            height: 70px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            margin: 10px auto;
        }

        .result-label {
            font-size: 18px;
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="player-status blue-status">🤖 कंप्यूटर <br> ⚔️ 0</div>
        <div class="player-status yellow-status">🤖 कंप्यूटर <br> ⚔️ 0</div>
    </div>

    <div class="ludo-board">
        <div class="home red-home">
            <div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div>
        </div>

        <div class="home yellow-home">
            <div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div>
        </div>

        <div class="center-box">
            <div class="c-green"></div>
            <div class="c-red"></div>
            <div class="c-yellow"></div>
            <div class="c-blue"></div>
        </div>

        <div class="home blue-home"></div>

        <div class="home green-home"></div>
    </div>

    <div class="dice-area">
        <div class="dice-box" id="dice" onclick="roll()">⚃</div>
        <div class="result-label">आया: <span id="num">4</span></div>
    </div>

    <script>
        function roll() {
            const diceArr = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            const n = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice').innerText = diceArr[n-1];
            document.getElementById('num').innerText = n;
            
            // पासा घूमने का छोटा इफेक्ट
            document.getElementById('dice').style.transform = "scale(0.9)";
            setTimeout(() => { document.getElementById('dice').style.transform = "scale(1)"; }, 100);
        }
    </script>
</body>
</html>
