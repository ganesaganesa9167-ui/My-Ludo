<script>
    function buildBoard() {
        const b = document.getElementById('board');
        b.innerHTML = ''; // बोर्ड साफ़ करें
        
        // 1. घर और केंद्र के डिव को पहले ही बना लें (यह कोड सही है)
        b.innerHTML = `
            <div class="home red-home"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div>
            <div class="home green-home"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div>
            <div class="home blue-home"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div>
            <div class="home yellow-home"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div>
            <div class="center-home">
                <div class="triangle t-top"></div>
                <div class="triangle t-right"></div>
                <div class="triangle t-bottom"></div>
                <div class="triangle t-left"></div>
            </div>
        `;

        // 2. गणितीय रास्ता (Path) बनाएँ और केवल ८ सितारे लगाएँ
        for(let i=0; i<225; i++) {
            let r=Math.floor(i/15)+1, c=(i%15)+1;
            // घर और केंद्र को छोड़कर सेल्स बनाएँ
            if(!((r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10) || (r>=7 && r<=9 && c>=7 && c<=9))) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.gridArea = `${r} / ${c}`;

                // --- सटीक शाही रास्ते ---
                if (r === 8 && c >= 2 && c <= 6) cell.classList.add('p-red');
                if (c === 8 && r >= 2 && r <= 6) cell.classList.add('p-green');
                if (r === 8 && c >= 10 && c <= 14) cell.classList.add('p-yellow');
                if (c === 8 && r >= 10 && r <= 14) cell.classList.add('p-blue');

                // --- सितारों का वैज्ञानिक स्थान (Exactly 8 Safe Spots) ---
                // यह लूडो के मानक नियमों के अनुसार सटीक गणितीय स्थान हैं
                const stars = [
                    {r:7, c:2}, {r:9, c:3},   // Red Area Stars
                    {r:2, c:9}, {r:3, c:7},   // Green Area Stars
                    {r:9, c:14}, {r:7, c:13}, // Yellow Area Stars
                    {r:14, c:7}, {r:13, c:9}  // Blue Area Stars
                ];
                
                if (stars.some(s => s.r === r && s.c === c)) {
                    cell.innerHTML = "⭐";
                    cell.classList.add('star');
                }
                
                b.appendChild(cell);
            }
        }
    }
    // ... (रोल फंक्शन और window.onload वही रहेंगे) ...
</script>
